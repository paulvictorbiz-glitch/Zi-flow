<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Workflow — short-form video ops</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f17" />
  <!-- Display-mode no-flash guard: apply saved accessibility prefs to <html>
       before the bundle loads, so opted-in users don't see a default→comfortable
       snap. No-op when no preference is set (keeps the default site untouched). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("wb_theme");
        var s = localStorage.getItem("wb_fontscale");
        var f = localStorage.getItem("wb_font");
        var el = document.documentElement;
        if (t && t !== "default") el.setAttribute("data-theme", t);
        // Scale is now a percent zoom ("80".."200", "100" = default). Sanitize
        // legacy/stray values (e.g. the old "normal") so we never set an
        // unmatched data-fontscale; agrees with ThemeProvider's "100" default.
        if (s && /^\d+$/.test(s) && s !== "100") el.setAttribute("data-fontscale", s);
        if (f && f !== "inter") el.setAttribute("data-font", f);
      } catch (e) {}
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Puter.js — free, client-side Claude (used by the Generate tab's "Puter" model option) -->
  <script src="https://js.puter.com/v2/"></script>
  <!-- Microsoft Clarity — heatmaps + session recording (project: x6co82yf7y) -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "x6co82yf7y");
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
